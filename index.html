<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#09090f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Treino Semanal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      background:#09090f;
      color:#e8e8f0;
      font-family:'Inter',system-ui,-apple-system,sans-serif;
      line-height:1.6;
      -webkit-font-smoothing:antialiased;
      min-height:100vh;
      overflow-x:hidden;
    }

    /* ── Design Tokens ── */
    :root {
      --bg:       #09090f;
      --bg2:      #0d0d16;
      --card:     #12121e;
      --card2:    #16162a;
      --surface:  rgba(255,255,255,.04);
      --border:   #1a1a28;
      --border2:  #222232;
      --push:     #5b9aff;
      --push-dim: rgba(91,154,255,.08);
      --pull:     #00d4a0;
      --pull-dim: rgba(0,212,160,.08);
      --legs:     #a87fff;
      --legs-dim: rgba(168,127,255,.08);
      --full:     #f06040;
      --full-dim: rgba(240,96,64,.08);
      --green:    #22c77e;
      --green-dim:rgba(34,199,126,.08);
      --gold:     #e8a020;
      --text:     #e8e8f0;
      --text2:    #9090b0;
      --text3:    #44445a;
      --radius:   16px;
      --radius-sm:10px;
      --radius-xs: 7px;
      --shadow:   0 8px 32px rgba(0,0,0,.5);
      --shadow-sm:0 2px 12px rgba(0,0,0,.3);
      --transition:.25s cubic-bezier(.4,0,.2,1);
      --nav-h:    62px;
    }

    /* ── Layout ── */
    .app {
      max-width: 600px;
      margin: 0 auto;
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── App Header ── */
    .app-header {
      padding: 48px 20px 12px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .app-title {
      font-size: 1.15rem;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -.02em;
    }
    .sync-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(91,154,255,.08);
      border: 1px solid rgba(91,154,255,.18);
      padding: 4px 10px;
      border-radius: 100px;
      font-size: .65rem;
      font-weight: 700;
      color: var(--push);
      letter-spacing: .4px;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity var(--transition);
    }
    .sync-badge.visible { opacity: 1; }
    .sync-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Progress bar ── */
    .prog-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .prog-track {
      flex: 1;
      height: 4px;
      background: var(--border2);
      border-radius: 100px;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--push), var(--legs), var(--pull));
      background-size: 200% 100%;
      border-radius: 100px;
      width: 0%;
      transition: width .6s cubic-bezier(.4,0,.2,1);
      animation: progShift 4s ease-in-out infinite;
    }
    @keyframes progShift { 0%,100%{background-position:0%} 50%{background-position:100%} }
    .prog-stats {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .prog-stat {
      font-family: 'JetBrains Mono', monospace;
      font-size: .68rem;
      font-weight: 700;
      color: var(--text3);
    }
    .prog-stat span { color: var(--push); }
    .prog-stat.fire span { color: var(--gold); }

    /* ── Scroll content ── */
    .content-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .swipe-container {
      display: flex;
      width: 700%;
      height: 100%;
      transition: transform .25s cubic-bezier(.4,0,.2,1);
      will-change: transform;
    }
    .day-panel {
      width: calc(100% / 7);
      height: 100%;
      overflow-y: auto;
      padding: 12px 16px calc(var(--nav-h) + 80px);
      -webkit-overflow-scrolling: touch;
    }
    .day-panel::-webkit-scrollbar { display: none; }

    /* ── Day header card ── */
    .day-header {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .day-title {
      font-size: 1rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.01em;
    }
    .day-type-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: .6rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: var(--radius-xs);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-top: 4px;
    }
    .mark-all-btn {
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text2);
      font-family: 'Inter', sans-serif;
      font-size: .72rem;
      font-weight: 700;
      padding: 7px 14px;
      border-radius: var(--radius-xs);
      cursor: pointer;
      transition: var(--transition);
      flex-shrink: 0;
    }
    .mark-all-btn:hover { border-color: var(--green); color: var(--green); }
    .mark-all-btn.done { background: var(--green-dim); border-color: rgba(34,199,126,.3); color: var(--green); }

    /* ── Exercise card ── */
    .ex-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 6px;
      overflow: hidden;
      transition: border-color var(--transition), background var(--transition);
    }
    .ex-card:hover { border-color: var(--border2); }
    .ex-card.is-done {
      border-color: rgba(34,199,126,.15);
      background: linear-gradient(135deg, var(--card), rgba(34,199,126,.02));
    }
    .ex-card.is-open { border-color: rgba(91,154,255,.25); }

    .ex-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 13px;
    }

    /* Custom checkbox */
    .cb-wrap {
      position: relative;
      width: 20px; height: 20px;
      flex-shrink: 0;
    }
    .cb-wrap input {
      position: absolute;
      opacity: 0; width: 100%; height: 100%;
      cursor: pointer; z-index: 2; margin: 0;
    }
    .cb-box {
      width: 20px; height: 20px;
      border-radius: 6px;
      border: 1.5px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
      color: transparent;
      font-size: .65rem;
      font-weight: 900;
    }
    .cb-wrap input:checked + .cb-box {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
      box-shadow: 0 0 10px rgba(34,199,126,.3);
      animation: cbPop .25s ease;
    }
    @keyframes cbPop { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

    .ex-name {
      flex: 1;
      font-size: .875rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: var(--transition);
    }
    .ex-name.striked {
      text-decoration: line-through;
      text-decoration-color: var(--text3);
      color: var(--text3);
    }

    /* Tags */
    .tags { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
    .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: .6rem;
      font-weight: 600;
      padding: 3px 7px;
      border-radius: 5px;
      white-space: nowrap;
    }

    /* Expand button */
    .expand-btn {
      width: 24px; height: 24px;
      border-radius: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text3);
      font-size: .5rem;
      flex-shrink: 0;
    }
    .expand-btn:hover { background: var(--border); color: var(--text); }
    .ex-card.is-open .expand-btn {
      background: rgba(91,154,255,.15);
      color: var(--push);
      border-color: rgba(91,154,255,.3);
      transform: rotate(180deg);
    }

    /* Expand detail */
    .ex-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height .4s cubic-bezier(.4,0,.2,1);
    }
    .ex-card.is-open .ex-detail { max-height: 420px; }
    .ex-detail-inner {
      padding: 0 13px 14px;
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 14px;
      align-items: start;
    }
    @media(max-width:400px) { .ex-detail-inner { grid-template-columns: 1fr; } }

    .gif-frame {
      background: var(--bg2);
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 1/1;
      border: 1px solid var(--border);
    }
    .gif-frame img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 6px;
      margin-bottom: 8px;
    }
    .detail-cell {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      text-align: center;
    }
    .detail-cell .val {
      font-family: 'JetBrains Mono', monospace;
      font-size: .82rem;
      font-weight: 700;
      color: var(--text);
    }
    .detail-cell .key {
      font-size: .58rem;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .5px;
      font-weight: 600;
      margin-top: 2px;
    }
    .tech-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: .65rem;
      font-weight: 700;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: calc(var(--nav-h) + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #0e2010;
      border: 1px solid rgba(34,199,126,.3);
      color: var(--green);
      font-size: .75rem;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 10px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: var(--shadow);
      z-index: 200;
      opacity: 0;
      transition: opacity .3s, transform .3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Bottom tab bar ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      height: var(--nav-h);
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 4px;
      z-index: 100;
      width: 100%;
      max-width: 600px;
      left: 50%;
      transform: translateX(-50%);
    }
    .nav-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 8px 4px;
      border-radius: 10px;
      cursor: pointer;
      transition: background var(--transition);
      min-width: 44px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-tab .t-emoji {
      font-size: 1.1rem;
      filter: grayscale(.7);
      transition: filter var(--transition);
      line-height: 1;
    }
    .nav-tab .t-name {
      font-size: .55rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text3);
      transition: color var(--transition);
    }
    .nav-tab .t-bar {
      width: 14px; height: 2px;
      border-radius: 1px;
      background: transparent;
      margin-top: 1px;
      transition: background var(--transition);
    }
    .nav-tab.is-active {
      background: var(--push-dim);
    }
    .nav-tab.is-active .t-emoji { filter: none; }
    .nav-tab.is-active .t-name { color: var(--push); }
    .nav-tab.is-active .t-bar { background: var(--push); }
    .nav-tab.is-done .t-emoji { filter: none; }
    .nav-tab.is-done .t-name { color: var(--green); }
    .nav-tab.is-today { border: 1px solid rgba(232,160,32,.25); }

    /* More drawer */
    .more-drawer {
      position: fixed;
      bottom: calc(var(--nav-h) + 6px);
      right: 12px;
      background: var(--card2);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 8px;
      z-index: 150;
      display: none;
      box-shadow: var(--shadow);
    }
    .more-drawer.open { display: block; }
    .drawer-tab {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: background var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .drawer-tab:hover { background: var(--surface); }
    .drawer-tab.is-active { background: var(--push-dim); }
    .drawer-tab .dt-emoji { font-size: 1.1rem; }
    .drawer-tab .dt-info { display: flex; flex-direction: column; }
    .drawer-tab .dt-name { font-size: .8rem; font-weight: 700; color: var(--text); }
    .drawer-tab .dt-type { font-size: .65rem; color: var(--text3); }
    .drawer-tab.is-done .dt-name { color: var(--green); }

    /* ── Confetti ── */
    .confetti-box {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
    }
    .conf {
      position: absolute;
      border-radius: 2px;
      animation: confDrop 3s ease-in forwards;
    }
    @keyframes confDrop {
      0% { transform:translateY(-20px) rotate(0deg) scale(1); opacity:1 }
      80% { opacity:.8 }
      100% { transform:translateY(100vh) rotate(720deg) scale(.5); opacity:0 }
    }

    /* ── Responsive ── */
    @media(max-width:480px) {
      .nav-tab { min-width: 36px; padding: 6px 4px 4px; }
      .ex-row { padding: 10px 11px; gap: 8px; }
    }
  </style>
</head>

<div class="app">

</div><!-- .app -->

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- More days drawer -->
<div class="more-drawer" id="moreDrawer"></div>

<!-- Bottom nav -->
<nav class="bottom-nav" id="bottomNav"></nav>

<!-- Confetti container -->
<div class="confetti-box" id="confettiBox"></div>

  'BI-SET':     {bg:'rgba(168,127,255,.1)',c:'#a87fff', b:'rgba(168,127,255,.2)'},
};
const CM = {
  push:{tag:'rgba(91,154,255,.1)', tc:'#5b9aff', bg:'rgba(91,154,255,.06)', bc:'#5b9aff'},
  pull:{tag:'rgba(0,212,160,.08)',  tc:'#00d4a0', bg:'rgba(0,212,160,.06)',  bc:'#00d4a0'},
  legs:{tag:'rgba(168,127,255,.08)',tc:'#a87fff', bg:'rgba(168,127,255,.06)',bc:'#a87fff'},
  full:{tag:'rgba(240,96,64,.08)',  tc:'#f06040', bg:'rgba(240,96,64,.06)',  bc:'#f06040'},
};

// ═══ STATE ═══
function weekKey() {
  const d = new Date(), y = d.getFullYear(), j = new Date(y,0,1);
  return `t_${y}_w${Math.ceil(((d-j)/864e5 + j.getDay()+1)/7)}`;
}
let S = {}; const K = weekKey();
function load() { try { S = JSON.parse(localStorage.getItem(K)) || {} } catch(e){ S={} } }
function save() { localStorage.setItem(K, JSON.stringify(S)) }
function exDone(d,i) { return S[`${d}_${i}`] === true }
function setEx(d,i,v) { S[`${d}_${i}`] = v; save() }
function dayDone(d) { return W[d].exs.every((_,i) => exDone(d,i)) }
function todayIdx() { const d = new Date().getDay(); return d===0?6:d-1 }

// ═══ RENDER PANELS ═══
const DAY_EMOJI = ['💪','🏋️','🦵','💪','🏋️','🦵','🔥'];

function renderPanels() {
  const container = document.getElementById('swipeContainer');
  container.innerHTML = '';
  W.forEach((w, di) => {
    const cm = CM[w.c];
    const panel = document.createElement('div');
    panel.className = 'day-panel';
    panel.id = `p-${di}`;

    const isDone = dayDone(di);
    panel.innerHTML = `
      <div class="day-header">
        <div>
          <div class="day-title">${DAY_EMOJI[di]} ${DAYS[di]}</div>
          <span class="day-type-tag" style="background:${cm.tag};color:${cm.tc}">${w.label}</span>
        </div>
        <button class="mark-all-btn${isDone?' done':''}" id="dayBtn${di}" onclick="toggleDay(${di})">
          ${isDone ? '✅ Concluído' : 'Marcar tudo'}
        </button>
      </div>`;

    w.exs.forEach((ex, ei) => {
      const done = exDone(di, ei);
      const card = document.createElement('div');
      card.className = `ex-card${done?' is-done':''}`;
      card.id = `x-${di}-${ei}`;

      let tagsHtml = `<span class="tag" style="background:${cm.bg};color:${cm.bc}">${ex.s}×${ex.r}</span>`;
      tagsHtml += `<span class="tag" style="background:var(--surface);color:var(--text3)">⏱${ex.d}</span>`;
      if (ex.t) {
        const tc = TC[ex.t] || TC['SLOW'];
        tagsHtml += `<span class="tag" style="background:${tc.bg};color:${tc.c};border:1px solid ${tc.b}">${ex.t}</span>`;
      }

      const techPill = ex.t ? (() => {
        const tc = TC[ex.t] || TC['SLOW'];
        return `<div class="tech-pill" style="background:${tc.bg};color:${tc.c};border:1px solid ${tc.b}">⚡ ${ex.t}</div>`;
      })() : '';

      card.innerHTML = `
        <div class="ex-row">
          <label class="cb-wrap">
            <input type="checkbox" ${done?'checked':''} onchange="toggleEx(${di},${ei},this.checked)">
            <span class="cb-box">✓</span>
          </label>
          <span class="ex-name${done?' striked':''}" onclick="toggleOpen(${di},${ei})">${ex.n}</span>
          <div class="tags">${tagsHtml}</div>
          <button class="expand-btn" onclick="toggleOpen(${di},${ei})">▼</button>
        </div>
        <div class="ex-detail">
          <div class="ex-detail-inner">
            <div class="gif-frame">
              <img src="${ex.img}" alt="${ex.n}" loading="lazy" onerror="this.src='${FB}'">
            </div>
            <div>
              <div class="detail-grid">
                <div class="detail-cell"><div class="val">${ex.s}</div><div class="key">Séries</div></div>
                <div class="detail-cell"><div class="val">${ex.r}</div><div class="key">Reps</div></div>
                <div class="detail-cell"><div class="val">${ex.d}</div><div class="key">Descanso</div></div>
              </div>
              ${techPill}
            </div>
          </div>
        </div>`;
      panel.appendChild(card);
    });

    container.appendChild(panel);
  });
}

// ═══ BOTTOM NAV ═══
let currentDay = 0;
const MAIN_TABS = [0,1,2,3];

function renderNav() {
  const nav = document.getElementById('bottomNav');
  const ti = todayIdx();
  let html = '';
  MAIN_TABS.forEach(i => {
    const done = dayDone(i);
    const active = currentDay === i;
    const today = i === ti;
    html += `<div class="nav-tab${active?' is-active':''}${done?' is-done':''}${today?' is-today':''}"
      onclick="switchDay(${i})">
      <div class="t-emoji">${DAY_EMOJI[i]}</div>
      <div class="t-name">${SHORT[i]}</div>
      <div class="t-bar"></div>
    </div>`;
  });
  const extraActive = currentDay > 3;
  html += `<div class="nav-tab${extraActive?' is-active':''}" onclick="toggleDrawer()">
    <div class="t-emoji">···</div>
    <div class="t-name">+3</div>
    <div class="t-bar"></div>
  </div>`;
  nav.innerHTML = html;

  const drawer = document.getElementById('moreDrawer');
  const ti2 = todayIdx();
  drawer.innerHTML = [4,5,6].map(i => {
    const done = dayDone(i);
    const active = currentDay === i;
    return `<div class="drawer-tab${active?' is-active':''}${done?' is-done':''}"
      onclick="switchDay(${i});closeDrawer()">
      <div class="dt-emoji">${DAY_EMOJI[i]}</div>
      <div class="dt-info">
        <div class="dt-name">${DAYS[i]}${i===ti2?' · HOJE':''}</div>
        <div class="dt-type">${W[i].label}${done?' ✓':''}</div>
      </div>
    </div>`;
  }).join('');
}

let drawerOpen = false;
function toggleDrawer() {
  drawerOpen = !drawerOpen;
  document.getElementById('moreDrawer').classList.toggle('open', drawerOpen);
}
function closeDrawer() {
  drawerOpen = false;
  document.getElementById('moreDrawer').classList.remove('open');
}
document.addEventListener('click', e => {
  if (drawerOpen && !e.target.closest('#moreDrawer') && !e.target.closest('.nav-tab')) closeDrawer();
});

function switchDay(i) {
  currentDay = i;
  document.getElementById('swipeContainer').style.transform = `translateX(${-i * (100/7)}%)`;
  renderNav();
}

// ═══ SWIPE ═══
(function initSwipe() {
  const wrap = document.getElementById('contentWrap');
  let startX = 0, startY = 0, moved = false;

  wrap.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    moved = false;
  }, { passive: true });

  wrap.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (!moved && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) moved = true;
  }, { passive: true });

  wrap.addEventListener('touchend', e => {
    if (!moved) return;
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) < 50) return;
    if (dx < 0 && currentDay < 6) switchDay(currentDay + 1);
    else if (dx > 0 && currentDay > 0) switchDay(currentDay - 1);
  }, { passive: true });
})();

// ═══ ACTIONS ═══
function toggleOpen(d, i) {
  document.getElementById(`x-${d}-${i}`).classList.toggle('is-open');
}

function toggleEx(d, i, v) {
  setEx(d, i, v);
  const card = document.getElementById(`x-${d}-${i}`);
  card.classList.toggle('is-done', v);
  const name = card.querySelector('.ex-name');
  name.classList.toggle('striked', v);
  if (v) { card.style.transform='scale(1.005)'; setTimeout(()=>card.style.transform='',200); }
  updateDayBtn(d);
  updateProgress();
  renderNav();
  syncToServer(K, S);
}

function toggleDay(d) {
  const all = dayDone(d);
  W[d].exs.forEach((_, i) => {
    setEx(d, i, !all);
    const card = document.getElementById(`x-${d}-${i}`);
    const cb = card.querySelector('input[type=checkbox]');
    if (cb) cb.checked = !all;
    card.classList.toggle('is-done', !all);
    card.querySelector('.ex-name').classList.toggle('striked', !all);
  });
  updateDayBtn(d);
  updateProgress();
  renderNav();
  syncToServer(K, S);
  if (!all) confetti();
}

function updateDayBtn(d) {
  const btn = document.getElementById(`dayBtn${d}`);
  const done = dayDone(d);
  btn.className = `mark-all-btn${done?' done':''}`;
  btn.textContent = done ? '✅ Concluído' : 'Marcar tudo';
}

function updateProgress() {
  let tot = 0, dn = 0;
  W.forEach((w, di) => w.exs.forEach((_, ei) => { tot++; if(exDone(di,ei)) dn++; }));
  const p = tot ? Math.round(dn/tot*100) : 0;
  document.getElementById('progFill').style.width = p + '%';

  let dc = 0, streak = 0, mx = 0;
  for (let i=0;i<7;i++) { if(dayDone(i)){dc++;streak++;if(streak>mx)mx=streak}else streak=0 }
  document.getElementById('statDays').innerHTML = `<span>${dc}</span>/7`;
  document.getElementById('statStreak').innerHTML = `<span>${mx}</span>🔥`;
}

function resetWeek() {
  if (!confirm('Resetar todo o progresso desta semana?')) return;
  localStorage.removeItem(K); S = {};
  if (serverAvailable) {
    fetch(`http://localhost:3001/api/progresso/${K}`, { method: 'DELETE' }).catch(()=>{});
  }
  renderPanels(); renderNav(); updateProgress();
}

function confetti() {
  const box = document.getElementById('confettiBox');
  const cols = ['#5b9aff','#00d4a0','#a87fff','#f06040','#e8a020','#22c77e'];
  for (let i=0;i<50;i++) {
    const c = document.createElement('div'); c.className = 'conf';
    c.style.cssText = `left:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};animation-delay:${Math.random()*1.2}s;animation-duration:${2+Math.random()*2}s;width:${5+Math.random()*7}px;height:${5+Math.random()*7}px`;
    box.appendChild(c);
  }
  setTimeout(() => box.innerHTML = '', 4500);
}

// ═══ TOAST ═══
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.innerHTML = `✓ ${msg}`;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ═══ SYNC ═══
let serverAvailable = false;
const DEFAULT_HOST = '192.168.3.152:3001';
const API = 'http://' + (localStorage.getItem('serverHost') || DEFAULT_HOST);

function settingsHost() {
  const cur = localStorage.getItem('serverHost') || DEFAULT_HOST;
  const val = prompt('IP:porta do servidor PC (ex: 192.168.3.152:3001)', cur);
  if (val && val.trim()) {
    localStorage.setItem('serverHost', val.trim());
    location.reload();
  }
}

async function detectServer() {
  try {
    const r = await fetch(`${API}/api/health`, { signal: AbortSignal.timeout(2000) });
    return r.ok;
  } catch { return false; }
}

async function loadFromServer() {
  try {
    const r = await fetch(`${API}/api/progresso/${K}`, { signal: AbortSignal.timeout(3000) });
    if (r.ok) {
      const body = await r.json();
      S = body.state;
      save();
      return true;
    }
  } catch {}
  return false;
}

async function syncToServer(weekKey, state) {
  if (!serverAvailable) return;
  try {
    const r = await fetch(`${API}/api/progresso`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ weekKey, state })
    });
    if (r.ok) showToast('Progresso salvo no PC');
  } catch {}
}

async function initSync() {
  serverAvailable = await detectServer();
  if (serverAvailable) {
    document.getElementById('syncBadge').classList.add('visible');
    const loaded = await loadFromServer();
    if (loaded) {
      renderPanels();
      updateProgress();
      renderNav();
    }
  }
}

// ═══ SERVICE WORKER ═══
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/Treino_App/sw.js').catch(() => {});
}

// ═══ INIT ═══
load();
renderPanels();
switchDay(todayIdx());
updateProgress();
initSync();
</script>
